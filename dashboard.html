<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LusTV Ratings — Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ── estilos exclusivos do dashboard ─────────────────────────── */

  /* LAYOUT */
  .dash-content {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
    border-bottom: 1px solid #222;
    padding-top: 1.5rem;
  }
  .tab-btn {
    padding: 10px 18px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #aaa;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-btn:hover  { color: #fff; }
  .tab-btn.active { color: #fff; border-bottom-color: #e50914; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* SECTION TITLE */
  .sec-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-top: 8px;
  }

  /* MOVIE ROW */
  .movie-list { display: flex; flex-direction: column; gap: 8px; }
  .movie-row {
    display: flex; align-items: center; gap: 16px;
    background: #1c1c1c; border: 1px solid #2a2a2a;
    border-radius: 8px; padding: 12px 16px;
    transition: background 0.2s, border-color 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  .movie-row:hover { background: #222; border-color: #3a3a3a; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

  .rank {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px;
    min-width: 36px; text-align: center; color: #555;
  }
  .rank.gold   { color: #f5c518; }
  .rank.silver { color: #c0c0c0; }
  .rank.bronze { color: #cd7f32; }

  .poster {
    width: 46px; height: 64px; border-radius: 4px;
    background: #2a2a2a; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    overflow: hidden;
  }
  .poster img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

  .movie-info { flex: 1; min-width: 0; }
  .movie-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-meta  { font-size: 13px; color: #888; margin-top: 3px; }
  .movie-bar   { height: 3px; background: #2a2a2a; border-radius: 2px; margin-top: 7px; }
  .movie-bar-fill { height: 100%; border-radius: 2px; background: #e50914; transition: width 0.6s ease; }

  .badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
  }
  .badge-hot { background: rgba(229,9,20,0.2); color: #ff6b6b; border: 1px solid rgba(229,9,20,0.3); }
  .badge-up  { background: rgba(29,158,117,0.2); color: #4ade80; border: 1px solid rgba(29,158,117,0.3); }
  .badge-new { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
  .star { color: #f5c518; font-size: 13px; margin-left: 6px; }

  /* GENRE GRID */
  .genre-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px; margin-bottom: 28px;
  }
  .genre-card {
    background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 8px;
    padding: 18px 14px; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .genre-card:hover, .genre-card.selected { background: #222; border-color: #e50914; }
  .genre-card .gicon  { font-size: 26px; margin-bottom: 8px; }
  .genre-card .gname  { font-size: 13px; font-weight: 600; }

  /* PERFIL */
  .profile-wrap { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
  .profile-card {
    background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 12px; padding: 28px;
    display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center;
  }
  .avatar-big {
    width: 88px; height: 88px; border-radius: 50%; background: #e50914;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700; cursor: pointer; position: relative;
    border: 3px solid #b20710; transition: transform 0.2s;
  }
  .avatar-big:hover { transform: scale(1.05); }
  .avatar-big .edit-overlay {
    position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s; font-size: 20px;
  }
  .avatar-big:hover .edit-overlay { opacity: 1; }

  .profile-name-big { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; }
  .profile-since    { font-size: 12px; color: #666; }

  .edit-name-btn {
    background: none; border: 1px solid #2a2a2a; color: #888;
    padding: 6px 18px; border-radius: 20px; font-family: 'Inter', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .edit-name-btn:hover { border-color: #e50914; color: #fff; }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
  .stat-box   { background: #141414; border-radius: 8px; padding: 14px; }
  .stat-num   { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #e50914; }
  .stat-lbl   { font-size: 11px; color: #666; margin-top: 2px; }

  .profile-right { display: flex; flex-direction: column; gap: 16px; }
  .recentes-card {
    background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 12px; padding: 22px;
  }
  .recentes-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1px;
    margin-bottom: 16px; color: #888;
  }

  /* LOADING */
  .dash-loading {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 40px; color: #666; font-size: 14px;
  }
  .dash-spinner {
    width: 18px; height: 18px; border: 2px solid #2a2a2a;
    border-top-color: #e50914; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* EMPTY */
  .empty { text-align: center; padding: 48px; color: #555; font-size: 14px; }

  /* MODAL AVATAR */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
    padding: 28px; width: 360px;
  }
  .modal-box h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; margin-bottom: 16px; }
  .emoji-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 20px;
  }
  .emoji-opt {
    font-size: 24px; padding: 8px; border-radius: 8px; cursor: pointer;
    text-align: center; transition: background 0.15s; border: 2px solid transparent;
  }
  .emoji-opt:hover    { background: #222; }
  .emoji-opt.selected { border-color: #e50914; background: #222; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel {
    background: none; border: 1px solid #2a2a2a; color: #888;
    padding: 8px 18px; border-radius: 6px; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.85rem;
  }
  .btn-save {
    background: #e50914; border: none; color: #fff;
    padding: 8px 18px; border-radius: 6px; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600;
  }
  .btn-save:hover { background: #b20710; }

  /* ── Sino de notificações ───────────────────────────────────── */
  .notif-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .btn-sino {
    background: none;
    border: none;
    cursor: pointer;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    border-radius: 50%;
    transition: color 0.2s, background 0.2s;
  }
  .btn-sino:hover { color: #fff; background: #222; }
  .notif-badge {
    position: absolute;
    top: 0; right: 0;
    background: #e50914;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .notif-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    width: 300px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    z-index: 1100;
    overflow: hidden;
  }
  .notif-dropdown.open { display: block; }
  .notif-dropdown-head {
    padding: 12px 16px;
    font-size: 0.8rem;
    font-weight: 700;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #222;
  }
  .notif-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    border-bottom: 1px solid #1f1f1f;
    transition: background 0.15s;
  }
  .notif-item:last-child { border-bottom: none; }
  .notif-item:hover { background: #111; }
  .notif-item.nao-lida { background: #1f1414; }
  .notif-item.nao-lida:hover { background: #251515; }
  .notif-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #e50914;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .notif-texto {
    flex: 1; min-width: 0;
    font-size: 0.8rem;
    color: #bbb;
    line-height: 1.4;
  }
  .notif-texto strong { color: #fff; }
  .notif-tempo {
    font-size: 0.72rem;
    color: #555;
    flex-shrink: 0;
  }
  .notif-vazio {
    padding: 2rem;
    text-align: center;
    font-size: 0.82rem;
    color: #555;
  }
</style>
</head>
<body>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
const API      = 'https://backend-cat-logo-production.up.railway.app';
const TMDB_KEY = '8bcf3516840c71be090ce067d3464a1d';
const IMG_SM   = 'https://image.tmdb.org/t/p/w92';
const TMDB_URL = 'https://api.themoviedb.org/3';
const AVATARES = ['🦊','🐻','🎭','🎬','🦁','🐼','🦸','🌟','🎮','🐯','🦋','🐉','🎸','🚀','🌙','👾','🦅','🐺','🎪','🔥','💎','🌊','🎯','🏆'];

let token            = localStorage.getItem('lustv_token');
let usuario          = JSON.parse(localStorage.getItem('lustv_usuario') || 'null');
let avatarSelecionado = null;

function getToken() { return localStorage.getItem('lustv_token'); }
function iniciais(nome) {
  return nome.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function tempoAtras(ts) {
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 60)     return 'agora mesmo';
  if (diff < 3600)   return Math.floor(diff / 60) + 'm atrás';
  if (diff < 86400)  return Math.floor(diff / 3600) + 'h atrás';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd atrás';
  return new Date(ts).toLocaleDateString('pt-BR');
}

// ── Login box ──────────────────────────────────────────────────
function renderLoginBox() {
  const box = document.getElementById('login-box');
  if (usuario) {
    const av = usuario.avatar || iniciais(usuario.nome);
    box.innerHTML = `
      <div class="user-chip">
        <div class="user-avatar-sm" style="font-size:${usuario.avatar ? '14px' : '11px'}">${av}</div>
        <span class="user-chip-nome">${usuario.nome}</span>
        <button class="btn-sair" onclick="fazerLogout()">Sair</button>
      </div>`;
  } else {
    box.innerHTML = `<button class="btn-entrar" onclick="window.location.href='index.html'">Entrar</button>`;
  }
}

// ── Notificações ───────────────────────────────────────────────
async function carregarNotificacoes() {
  const t = getToken();
  if (!t) return;
  try {
    const res    = await fetch(API + '/social/notificacoes', { headers: { Authorization: 'Bearer ' + t } });
    const notifs = await res.json();
    const naoLidas = notifs.filter(n => !n.lida).length;

    const badge = document.getElementById('notif-badge');
    if (naoLidas > 0) {
      badge.textContent   = naoLidas > 9 ? '9+' : naoLidas;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }

    const lista = document.getElementById('notif-lista');
    if (!notifs.length) {
      lista.innerHTML = '<div class="notif-vazio">Nenhuma notificação ainda.</div>';
      return;
    }
    lista.innerHTML = '';
    notifs.forEach(n => {
      const item = document.createElement('div');
      item.className = 'notif-item' + (!n.lida ? ' nao-lida' : '');
      item.innerHTML = `
        <div class="notif-avatar">${iniciais(n.ator_nome)}</div>
        <div class="notif-texto"><strong>${n.ator_nome}</strong> começou a te seguir</div>
        <div class="notif-tempo">${tempoAtras(n.criado_em)}</div>`;
      lista.appendChild(item);
    });
  } catch(e) { console.error('[NOTIF]', e.message); }
}

async function toggleNotifDropdown() {
  const dropdown = document.getElementById('notif-dropdown');
  const aberto   = dropdown.classList.contains('open');
  dropdown.classList.toggle('open');
  if (!aberto) {
    const badge = document.getElementById('notif-badge');
    if (badge.style.display !== 'none') {
      try {
        await fetch(API + '/social/notificacoes/lidas', {
          method: 'PATCH',
          headers: { Authorization: 'Bearer ' + getToken() }
        });
        badge.style.display = 'none';
        document.querySelectorAll('.notif-item.nao-lida')
          .forEach(el => el.classList.remove('nao-lida'));
      } catch(e) { console.error('[NOTIF LIDAS]', e.message); }
    }
  }
}

document.addEventListener('click', function(e) {
  const wrap = document.getElementById('notif-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('notif-dropdown').classList.remove('open');
  }
});

// ── Utilitários ────────────────────────────────────────────────
function rankClass(i) { return i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : ''; }
function badgeHtml(i) {
  if (i === 0) return '<span class="badge badge-hot">Quente</span>';
  if (i < 3)   return '<span class="badge badge-up">Subindo</span>';
  return '<span class="badge badge-new">Novo</span>';
}
function posterHtml(url, emoji = '🎬') {
  if (url) return `<div class="poster"><img src="${url}" alt="" onerror="this.parentElement.innerHTML='${emoji}'"/></div>`;
  return `<div class="poster">${emoji}</div>`;
}
function delay(i) { return `animation-delay:${i * 0.06}s`; }

// ── Tabs ───────────────────────────────────────────────────────
const TAB_KEYS = ['semana', 'mundo', 'genero', 'perfil'];
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', TAB_KEYS[i] === id);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  if (id === 'semana') carregarSemana();
  if (id === 'mundo')  carregarMundo();
  if (id === 'genero') carregarGeneros();
  if (id === 'perfil') carregarPerfil();
  lucide.createIcons();
}

// ── SEMANA ─────────────────────────────────────────────────────
async function carregarSemana() {
  const el = document.getElementById('list-semana');
  el.innerHTML = '<div class="dash-loading"><div class="dash-spinner"></div> Carregando...</div>';
  try {
    const r    = await fetch(`${API}/tendencias/semana`, { headers: { Authorization: 'Bearer ' + getToken() } });
    const data = await r.json();
    if (!data.filmes || !data.filmes.length) {
      el.innerHTML = '<div class="empty">Nenhuma avaliação esta semana ainda. Seja o primeiro! 🎬</div>';
      return;
    }
    const max = data.filmes[0].total_avaliacoes || 1;
    el.innerHTML = data.filmes.map((f, i) => `
      <div class="movie-row" style="${delay(i)}">
        <div class="rank ${rankClass(i)}">${i + 1}</div>
        ${posterHtml(f.poster)}
        <div class="movie-info">
          <div class="movie-title">${f.titulo || 'Filme #' + f.id}</div>
          <div class="movie-meta">${f.generos?.join(', ') || ''} ${f.ano ? '• ' + f.ano : ''} <span class="star">★ ${f.media_estrelas}</span> • ${f.total_avaliacoes} avaliações</div>
          <div class="movie-bar"><div class="movie-bar-fill" style="width:${Math.round(f.total_avaliacoes / max * 100)}%"></div></div>
        </div>
        ${badgeHtml(i)}
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty">Erro ao carregar. Verifique se está logado.</div>';
  }
}

// ── GÊNEROS ────────────────────────────────────────────────────
const GENRE_ICONS = { 28:'💥',12:'🗺️',16:'✨',35:'😂',80:'🔫',99:'🎙️',18:'🎭',10751:'👨‍👩‍👧',14:'🧙',36:'📜',27:'👻',10402:'🎵',9648:'🔍',10749:'❤️',878:'🚀',10770:'📺',53:'😰',10752:'⚔️',37:'🤠' };

async function carregarGeneros() {
  const el = document.getElementById('genre-grid');
  el.innerHTML = '<div class="dash-loading"><div class="dash-spinner"></div> Carregando...</div>';
  try {
    const r    = await fetch(`${API}/tendencias/generos`);
    const data = await r.json();
    el.innerHTML = data.generos.map(g => `
      <div class="genre-card" onclick="selecionarGenero(${g.id}, '${g.name}', this)">
        <div class="gicon">${GENRE_ICONS[g.id] || '🎬'}</div>
        <div class="gname">${g.name}</div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty">Erro ao carregar gêneros.</div>';

}

async function selecionarGenero(id, nome, el) {
  document.querySelectorAll('.genre-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  const cont = document.getElementById('genre-filmes');
  cont.innerHTML = `<div class="sec-title" style="margin-top:24px">${GENRE_ICONS[id] || '🎬'} ${nome}</div>
    <div class="movie-list" id="list-genero">
      <div class="dash-loading"><div class="dash-spinner"></div> Carregando...</div>
    </div>`;
  try {
    const r    = await fetch(`${API}/tendencias/genero/${id}`);
    const data = await r.json();
    document.getElementById('list-genero').innerHTML = data.filmes.slice(0, 8).map((f, i) => `
      <div class="movie-row" style="${delay(i)}">
        <div class="rank ${rankClass(i)}">${i + 1}</div>
        ${posterHtml(f.poster)}
        <div class="movie-info">
          <div class="movie-title">${f.titulo}</div>
          <div class="movie-meta">${f.ano || ''} <span class="star">★ ${f.nota_tmdb}</span></div>
          <div class="movie-bar"><div class="movie-bar-fill" style="width:${Math.round(parseFloat(f.nota_tmdb) / 10 * 100)}%"></div></div>
        </div>
        ${badgeHtml(i)}
      </div>`).join('');
  } catch(e) {
    document.getElementById('list-genero').innerHTML = '<div class="empty">Erro ao carregar filmes do gênero.</div>';
  }
}

// ── PERFIL ─────────────────────────────────────────────────────
async function carregarPerfil() {
  try {
    const r    = await fetch(`${API}/perfil`, { headers: { Authorization: 'Bearer ' + getToken() } });
    const data = await r.json();
    const u = data.usuario;
    const s = data.estatisticas;

    document.getElementById('perfil-nome').textContent  = u.nome;
    document.getElementById('perfil-desde').textContent = 'Membro desde ' + new Date(u.membro_desde).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    document.getElementById('stat-total').textContent   = s.total_avaliacoes;
    document.getElementById('stat-media').textContent   = s.media_estrelas || '—';
    document.getElementById('stat-5').textContent       = s.notas_5;

    const av   = u.avatar || u.nome[0].toUpperCase();
    const avEl = document.getElementById('avatar-conteudo');
    avEl.textContent    = av;
    avEl.style.fontSize = u.avatar ? '40px' : '36px';

    const listEl = document.getElementById('list-recentes');
    if (!data.recentes || !data.recentes.length) {
      listEl.innerHTML = '<div class="empty">Nenhuma avaliação ainda.</div>';
      return;
    }

    const detalhes = await Promise.all(data.recentes.map(async av => {
      try {
        const rm = await fetch(`${TMDB_URL}/movie/${av.filme_id}?api_key=${TMDB_KEY}&language=pt-BR`);
        const dm = await rm.json();
        if (dm.title) return { titulo: dm.title, poster: dm.poster_path ? IMG_SM + dm.poster_path : null };
      } catch {}
      try {
        const rt = await fetch(`${TMDB_URL}/tv/${av.filme_id}?api_key=${TMDB_KEY}&language=pt-BR`);
        const dt = await rt.json();
        if (dt.name) return { titulo: dt.name, poster: dt.poster_path ? IMG_SM + dt.poster_path : null };
      } catch {}
      return { titulo: null, poster: null };
    }));

    listEl.innerHTML = data.recentes.map((av, i) => {
      const det    = detalhes[i];
      const titulo = det.titulo || 'Filme #' + av.filme_id;
      const poster = det.poster
        ? `<div class="poster"><img src="${det.poster}" alt="${titulo}" style="width:100%;height:100%;object-fit:cover;border-radius:4px"/></div>`
        : `<div class="poster">🎬</div>`;
      const estrelas   = '★'.repeat(av.estrelas) + '☆'.repeat(5 - av.estrelas);
      const dataFmt    = new Date(av.criado_em).toLocaleDateString('pt-BR');
      const comentario = av.comentario ? `<div class="movie-meta" style="font-style:italic;margin-top:4px">"${av.comentario}"</div>` : '';
      return `<div class="movie-row" style="${delay(i)}">${poster}
        <div class="movie-info">
          <div class="movie-title">${titulo}</div>
          <div class="movie-meta">${estrelas} • ${dataFmt}</div>
          ${comentario}
        </div></div>`;
    }).join('');
  } catch(e) {
    document.getElementById('list-recentes').innerHTML = '<div class="empty">Erro ao carregar perfil.</div>';
  }
}

// ── Modal avatar ───────────────────────────────────────────────
function abrirModalAvatar() {
  document.getElementById('emoji-grid').innerHTML = AVATARES.map(e =>
    `<div class="emoji-opt" onclick="selecionarEmoji('${e}', this)">${e}</div>`).join('');
  document.getElementById('modal-avatar').classList.add('open');
}
function fecharModal() {
  document.getElementById('modal-avatar').classList.remove('open');
  avatarSelecionado = null;
}
function selecionarEmoji(e, el) {
  document.querySelectorAll('.emoji-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  avatarSelecionado = e;
}
async function salvarAvatar() {
  if (!avatarSelecionado) return;
  try {
    const r    = await fetch(`${API}/perfil`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + getToken() },
      body: JSON.stringify({ avatar: avatarSelecionado })
    });
    const data = await r.json();
    if (data.usuario) {
      const u = JSON.parse(localStorage.getItem('lustv_usuario') || '{}');
      u.avatar = avatarSelecionado;
      localStorage.setItem('lustv_usuario', JSON.stringify(u));
      usuario = u;
      renderLoginBox();
      fecharModal();
      carregarPerfil();
    }
  } catch { alert('Erro ao salvar avatar.'); }
}
function editarNome() {
  const novo = prompt('Novo nome de usuário:');
  if (!novo || novo.trim().length < 2) return;
  fetch(`${API}/perfil`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + getToken() },
    body: JSON.stringify({ nome: novo.trim() })
  }).then(r => r.json()).then(data => {
    if (data.usuario) {
      const u = JSON.parse(localStorage.getItem('lustv_usuario') || '{}');
      u.nome  = data.usuario.nome;
      localStorage.setItem('lustv_usuario', JSON.stringify(u));
      usuario = u;
      renderLoginBox();
      carregarPerfil();
    } else { alert(data.erro || 'Erro ao atualizar nome.'); }
  });
}

// ── Logout ─────────────────────────────────────────────────────
function fazerLogout() {
  localStorage.removeItem('lustv_token');
  localStorage.removeItem('lustv_usuario');
  window.location.href = 'index.html';
}

if (!token) {

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo roxo escuro -->
  <rect width="100" height="100" rx="20" fill="#2d1b6e"/>
  <!-- Sombra do L -->
  <text x="29" y="81" font-family="Georgia, 'Times New Roman', serif" font-size="65"
        font-weight="700" fill="#1e0f50" opacity="0.7">L</text>
  <!-- L principal lilás -->
  <text x="26" y="79" font-family="Georgia, 'Times New Roman', serif" font-size="65"
        font-weight="700" fill="#9b6fd4">L</text>
  <!-- Brilho do L -->
  <text x="26" y="79" font-family="Georgia, 'Times New Roman', serif" font-size="65"
        font-weight="700" fill="#c49ee8" opacity="0.45">L</text>
  <!-- Sombra da estrela -->
  <polygon points="76,55 79,65 90,65 82,71 85,81 76,75 67,81 70,71 62,65 73,65"
           fill="#8b6000" opacity="0.4" transform="translate(1.5,1.5)"/>
  <!-- Estrela dourada -->
  <polygon points="76,55 79,65 90,65 82,71 85,81 76,75 67,81 70,71 62,65 73,65"
           fill="#f0b429"/>
  <!-- Brilho da estrela -->
  <polygon points="76,55 79,65 90,65 82,71 85,81 76,75 67,81 70,71 62,65 73,65"
           fill="#ffd966" opacity="0.45"/>
</svg>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LusTV-Ratings — Comunidade</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Página Comunidade ──────────────────────────────────────── */
    #comunidade-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    .comunidade-topo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 1.5rem 0 1rem;
    }

    .comunidade-topo h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-descobrir {
      background: none;
      border: 1.5px solid #333;
      color: #aaa;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 7px 18px;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-descobrir:hover { border-color: #8b5cf6; color: #fff; }

    /* Feed */
    #feed-lista { display: flex; flex-direction: column; gap: 10px; }

    .feed-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 16px;
      transition: border-color 0.2s;
      animation: cardIn 0.3s ease both;
    }
    .feed-card:hover { border-color: #3a3a3a; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .feed-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .feed-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: #8b5cf6;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }

    .feed-userinfo { flex: 1; min-width: 0; }
    .feed-userinfo strong { font-size: 0.88rem; font-weight: 700; display: block; color: #eee; }
    .feed-userinfo span  { font-size: 0.75rem; color: #666; }

    .btn-follow {
      background: none;
      border: 1.5px solid #333;
      color: #777;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-follow:hover    { border-color: #8b5cf6; color: #fff; }
    .btn-follow.seguindo { color: #555; border-color: #2a2a2a; }
    .btn-follow.seguindo:hover { border-color: #8b5cf6; color: #8b5cf6; }
    .btn-follow:disabled { opacity: 0.4; cursor: default; }

    /* Bloco do filme */
    .feed-filme {
      display: flex;
      gap: 12px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .feed-filme:hover { background: #1a1a1a; border-color: #3a3a3a; }

    .feed-poster {
      width: 46px; height: 68px;
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .feed-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .feed-filme-info {
      display: flex; flex-direction: column;
      justify-content: center; gap: 4px; min-width: 0;
    }
    .feed-filme-titulo {
      font-size: 0.88rem; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .feed-filme-meta { font-size: 0.75rem; color: #666; }
    .feed-estrelas   { font-size: 14px; color: #EF9F27; letter-spacing: 1px; }

    /* Comentário */
    .feed-comentario {
      margin-top: 10px;
      padding: 9px 13px;
      background: #141414;
      border-left: 2px solid #2e2e2e;
      border-radius: 0 6px 6px 0;
      font-size: 0.82rem;
      color: #888;
      font-style: italic;
      line-height: 1.55;
    }

    /* Estados */
    .feed-vazio {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      padding: 5rem 2rem; text-align: center; color: #555;
    }
    .feed-vazio-icon { font-size: 3rem; opacity: 0.4; }
    .feed-vazio p { font-size: 0.9rem; line-height: 1.6; }

    #feed-loader {
      display: none;
      justify-content: center; gap: 8px; padding: 1.5rem;
    }
    #feed-fim {
      display: none;
      justify-content: center; padding: 1.5rem;
      font-size: 0.8rem; color: #444;
    }

    /* Modal busca de usuários */
    #social-modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1200;
      align-items: flex-start; justify-content: center;
      padding: 80px 1.5rem 1.5rem;
      backdrop-filter: blur(4px);
    }
    #social-modal-overlay.open { display: flex; }

    #social-modal {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      width: 100%; max-width: 440px;
      overflow: hidden;
      animation: cardIn 0.22s ease;
    }

    .social-modal-head {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid #222;
      background: #111;
    }
    .social-modal-head i { color: #555; flex-shrink: 0; }

    #social-busca-input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 0.9rem; font-family: 'Inter', sans-serif; color: #fff;
    }
    #social-busca-input::placeholder { color: #555; }

    #social-modal-close {
      background: none; border: none; color: #555;
      font-size: 1.1rem; cursor: pointer; line-height: 1;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    #social-modal-close:hover { background: #8b5cf6; color: #fff; }

    #social-busca-resultados { max-height: 420px; overflow-y: auto; padding: 6px 0; }

    .social-user-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 18px; transition: background 0.15s;
    }
    .social-user-item:hover { background: #111; }

    .social-user-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: #8b5cf6;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }

    .social-user-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .social-user-info strong { font-size: 0.88rem; color: #eee; }
    .social-user-info small  { font-size: 0.74rem; color: #666; }

    .social-busca-vazio { text-align: center; padding: 2rem; font-size: 0.85rem; color: #555; }

    /* ── Sino de notificações ───────────────────────────────────── */
    .notif-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .btn-sino {
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 50%;
      transition: color 0.2s, background 0.2s;
    }
    .btn-sino:hover { color: #fff; background: #222; }

    .notif-badge {
      position: absolute;
      top: 0; right: 0;
      background: #8b5cf6;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }

    .notif-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 300px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 1100;
      overflow: hidden;
      animation: cardIn 0.2s ease;
    }
    .notif-dropdown.open { display: block; }

    .notif-dropdown-head {
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
    }

    .notif-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border-bottom: 1px solid #1f1f1f;
      transition: background 0.15s;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: #111; }
    .notif-item.nao-lida { background: #1a1428; }
    .notif-item.nao-lida:hover { background: #1e1a35; }

    .notif-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #8b5cf6;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }

    .notif-texto {
      flex: 1; min-width: 0;
      font-size: 0.8rem;
      color: #bbb;
      line-height: 1.4;
    }
    .notif-texto strong { color: #fff; }
    .notif-tempo {
      font-size: 0.72rem;
      color: #555;
      flex-shrink: 0;
    }

    .notif-vazio {
      padding: 2rem;
      text-align: center;
      font-size: 0.82rem;
      color: #555;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <i data-lucide="popcorn"></i> LusTV-Ratings
  </div>

  <nav>
    <button data-aba="filmes" onclick="window.location.href='index.html'">
      <i data-lucide="film"></i> Filmes
    </button>
    <button data-aba="series" onclick="window.location.href='index.html'">
      <i data-lucide="tv"></i> Séries
    </button>
    <button data-aba="documentarios" onclick="window.location.href='index.html'">
      <i data-lucide="clapperboard"></i> Docs
    </button>
    <button data-aba="animes" onclick="window.location.href='index.html'">
      <i data-lucide="sparkles"></i> Animações
    </button>
    <button data-aba="favoritos" onclick="window.location.href='index.html'">
      <i data-lucide="heart"></i> Favoritos
    </button>
    <a href="comunidade.html" class="nav-dashboard active-page">
      <i data-lucide="users"></i> Comunidade
    </a>
    <a href="dashboard.html" class="nav-dashboard">
      <i data-lucide="bar-chart-3"></i> Dashboard
    </a>
  </nav>

  <div class="search-wrap">
    <i data-lucide="search"></i>

  <!-- Sino de notificações -->
  <div class="notif-wrap" id="notif-wrap" style="display:none">
    <button class="btn-sino" id="btn-sino" onclick="toggleNotifDropdown()">
      <i data-lucide="bell"></i>
    </button>
    <span class="notif-badge" id="notif-badge" style="display:none"></span>

  <div id="login-box"></div>
</header>

<div id="comunidade-wrap">

      <i data-lucide="users"></i> Comunidade
    </h1>
    <button class="btn-descobrir" onclick="abrirModalBuscarUsuarios()">
      <i data-lucide="user-plus"></i> Descobrir usuários

  <div id="feed-lista"></div>
  <div id="feed-loader" class="loading">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>

</div>

<!-- Modal busca de usuários -->
<div id="social-modal-overlay">
  <div id="social-modal">
    <div class="social-modal-head">
      <i data-lucide="search"></i>
      <input id="social-busca-input" type="search" placeholder="Buscar usuários pelo nome..." autocomplete="off">
      <button id="social-modal-close" onclick="fecharModalSocial()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div id="social-busca-resultados"></div>
  </div>
</div>

<!-- Lucide CDN -->
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  const BACKEND  = 'https://backend-cat-logo-production.up.railway.app';
  const TMDB_KEY = '8bcf3516840c71be090ce067d3464a1d';
  const IMG_MD   = 'https://image.tmdb.org/t/p/w342';
  const TMDB_URL = 'https://api.themoviedb.org/3';

  let token   = localStorage.getItem('lustv_token');
  let usuario = JSON.parse(localStorage.getItem('lustv_usuario') || 'null');

  // ── Nav / login box ────────────────────────────────────────────
  function iniciais(nome) {
    return nome.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function renderLoginBox() {
    const box = document.getElementById('login-box');
    if (usuario) {
      const av = usuario.avatar || iniciais(usuario.nome);
      box.innerHTML = `
        <div class="user-chip">
          <div class="user-avatar-sm" style="font-size:${usuario.avatar ? '14px' : '11px'}">${av}</div>
          <span class="user-chip-nome">${usuario.nome}</span>
          <button class="btn-sair" onclick="fazerLogout()">Sair</button>
        </div>`;
      // Exibe o sino só para usuários logados
      document.getElementById('notif-wrap').style.display = 'flex';
      carregarNotificacoes();
    } else {
      box.innerHTML = `<button class="btn-entrar" onclick="window.location.href='index.html'">Entrar</button>`;
    }
  }

  function fazerLogout() {
    localStorage.removeItem('lustv_token');
    localStorage.removeItem('lustv_usuario');
    window.location.href = 'index.html';
  }

  // ── API helper ─────────────────────────────────────────────────
  async function apiReq(method, path, body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (token) opts.headers['Authorization'] = 'Bearer ' + token;
    if (body)  opts.body = JSON.stringify(body);
    const res  = await fetch(BACKEND + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.erro || 'Erro');
    return data;
  }

  // Cache TMDB
  const _tmdb = {};
  async function tmdbFilme(id) {
    if (_tmdb[id]) return _tmdb[id];
    try {
      const r = await fetch(`${TMDB_URL}/movie/${id}?api_key=${TMDB_KEY}&language=pt-BR`);
      const d = await r.json();
      if (d.title) { _tmdb[id] = d; return d; }
    } catch {}
    try {
      const r = await fetch(`${TMDB_URL}/tv/${id}?api_key=${TMDB_KEY}&language=pt-BR`);
      const d = await r.json();
      if (d.name) { _tmdb[id] = d; return d; }
    } catch {}
    return null;
  }

  function tempoAtras(ts) {
    const diff = (Date.now() - new Date(ts)) / 1000;
    if (diff < 60)     return 'agora mesmo';
    if (diff < 3600)   return Math.floor(diff / 60) + 'm atrás';
    if (diff < 86400)  return Math.floor(diff / 3600) + 'h atrás';
    if (diff < 604800) return Math.floor(diff / 86400) + 'd atrás';
    return new Date(ts).toLocaleDateString('pt-BR');
  }

  function estrelasTexto(n) {
    return '★'.repeat(n) + '☆'.repeat(5 - n);
  }

  // ── Notificações ───────────────────────────────────────────────
  async function carregarNotificacoes() {
    try {
      const notifs = await apiReq('GET', '/social/notificacoes');
      const naoLidas = notifs.filter(n => !n.lida).length;

      const badge = document.getElementById('notif-badge');
      if (naoLidas > 0) {
        badge.textContent = naoLidas > 9 ? '9+' : naoLidas;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }

      const lista = document.getElementById('notif-lista');
      if (!notifs.length) {
        lista.innerHTML = '<div class="notif-vazio">Nenhuma notificação ainda.</div>';
        return;
      }

      lista.innerHTML = '';
      notifs.forEach(n => {
        const item = document.createElement('div');
        item.className = 'notif-item' + (!n.lida ? ' nao-lida' : '');
        item.innerHTML = `
          <div class="notif-avatar">${iniciais(n.ator_nome)}</div>
          <div class="notif-texto">
            <strong>${n.ator_nome}</strong> começou a te seguir
          </div>
          <div class="notif-tempo">${tempoAtras(n.criado_em)}</div>`;
        lista.appendChild(item);
      });
    } catch(e) {
      console.error('[NOTIF]', e.message);
    }
  }

  async function toggleNotifDropdown() {
    const dropdown = document.getElementById('notif-dropdown');
    const aberto   = dropdown.classList.contains('open');

    dropdown.classList.toggle('open');

    // Marca como lidas ao abrir
    if (!aberto) {
      const badge = document.getElementById('notif-badge');
      if (badge.style.display !== 'none') {
        try {
          await apiReq('PATCH', '/social/notificacoes/lidas');
          badge.style.display = 'none';
          // Remove destaque visual das não lidas
          document.querySelectorAll('.notif-item.nao-lida')
            .forEach(el => el.classList.remove('nao-lida'));
        } catch(e) { console.error('[NOTIF LIDAS]', e.message); }
      }
    }
  }

  // Fecha dropdown ao clicar fora
  document.addEventListener('click', function(e) {
    const wrap = document.getElementById('notif-wrap');
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById('notif-dropdown').classList.remove('open');
    }
  });

  // Atualiza notificações a cada 60 segundos
  setInterval(() => {
    if (token) carregarNotificacoes();
  }, 60000);

  // ── Follow / Unfollow ──────────────────────────────────────────
  async function toggleFollow(targetId, btn) {
    if (!token) { window.location.href = 'index.html'; return; }
    const seguindo = btn.dataset.seguindo === 'true';
    btn.disabled = true;
    try {
      if (seguindo) {
        await apiReq('DELETE', '/social/follow', { following_id: targetId });
        btn.dataset.seguindo = 'false';
        btn.textContent = '+ Seguir';
        btn.classList.remove('seguindo');
      } else {
        await apiReq('POST', '/social/follow', { following_id: targetId });
        btn.dataset.seguindo = 'true';
        btn.textContent = '✓ Seguindo';
        btn.classList.add('seguindo');
      }
    } catch(e) { console.error('[FOLLOW]', e.message); }
    finally { btn.disabled = false; }
  }

  async function criarBtnFollow(targetId) {
    if (!usuario || usuario.id === targetId) return null;
    const btn = document.createElement('button');
    btn.className = 'btn-follow';
    btn.dataset.seguindo = 'false';
    btn.textContent = '+ Seguir';
    try {
      const { seguindo } = await apiReq('GET', `/social/follow/check/${targetId}`);
      if (seguindo) {
        btn.dataset.seguindo = 'true';
        btn.textContent = '✓ Seguindo';
        btn.classList.add('seguindo');
      }
    } catch {}
    btn.addEventListener('click', () => toggleFollow(targetId, btn));
    return btn;
  }

  // ── Feed ───────────────────────────────────────────────────────
  let _feedOffset   = 0;
  let _feedLoading  = false;
  let _feedEsgotado = false;
  const FEED_LIMIT  = 15;

  async function carregarFeed(reset = false) {
    if (!token) {
      document.getElementById('feed-lista').innerHTML = `
        <div class="feed-vazio">
          <div class="feed-vazio-icon">🔒</div>
          <p>Faça <a href="index.html" style="color:#8b5cf6">login</a> para ver o feed da comunidade.</p>
        </div>`;
      return;
    }
    if (_feedLoading || (_feedEsgotado && !reset)) return;

    if (reset) {
      _feedOffset = 0; _feedEsgotado = false;
      document.getElementById('feed-lista').innerHTML = '';
      document.getElementById('feed-fim').style.display = 'none';
    }

    _feedLoading = true;
    document.getElementById('feed-loader').style.display = 'flex';

    try {
      const data = await apiReq('GET', `/social/feed?limit=${FEED_LIMIT}&offset=${_feedOffset}`);
      document.getElementById('feed-loader').style.display = 'none';

      if (!data.feed.length && _feedOffset === 0) {
        document.getElementById('feed-lista').innerHTML = `
          <div class="feed-vazio">
            <div class="feed-vazio-icon">👥</div>
            <p>Seu feed está vazio.<br>Siga outros usuários para ver as avaliações deles aqui.</p>
            <button class="btn-descobrir" style="margin-top:8px" onclick="abrirModalBuscarUsuarios()">
              <i data-lucide="user-plus"></i> Descobrir usuários
            </button>
          </div>`;
        lucide.createIcons();
        return;
      }

      for (const item of data.feed) {
        const card = await criarFeedCard(item);
        document.getElementById('feed-lista').appendChild(card);
      }
      lucide.createIcons();

      _feedOffset += data.feed.length;
      if (_feedOffset >= data.total || data.feed.length < FEED_LIMIT) {
        _feedEsgotado = true;
        if (_feedOffset > 0) document.getElementById('feed-fim').style.display = 'flex';
      }
    } catch(e) {
      document.getElementById('feed-loader').style.display = 'none';
      document.getElementById('feed-lista').innerHTML += '<div class="empty-state">Erro ao carregar feed.</div>';
    } finally {
      _feedLoading = false;
    }
  }

  async function criarFeedCard(item) {
    const card = document.createElement('div');
    card.className = 'feed-card';

    const filme  = await tmdbFilme(item.filme_id);
    const titulo = filme?.title || filme?.name || 'Título #' + item.filme_id;
    const poster = filme?.poster_path ? IMG_MD + filme.poster_path : null;
    const ano    = (filme?.release_date || filme?.first_air_date || '').slice(0, 4);

    card.innerHTML = `
      <div class="feed-card-header">
        <div class="feed-avatar">${iniciais(item.usuario_nome)}</div>
        <div class="feed-userinfo">
          <strong>${item.usuario_nome}</strong>
          <span>${tempoAtras(item.criado_em)}</span>
        </div>
      </div>
      <div class="feed-filme">
        <div class="feed-poster">
          ${poster ? `<img src="${poster}" alt="${titulo}" loading="lazy">` : '🎬'}
        </div>
        <div class="feed-filme-info">
          <div class="feed-filme-titulo">${titulo}</div>
          ${ano ? `<div class="feed-filme-meta">${ano}</div>` : ''}
          <div class="feed-estrelas">${estrelasTexto(item.estrelas)}</div>
        </div>
      </div>
      ${item.comentario ? `<div class="feed-comentario">"${item.comentario}"</div>` : ''}`;

    const btnFollow = await criarBtnFollow(item.usuario_id);
    if (btnFollow) card.querySelector('.feed-card-header').appendChild(btnFollow);

    return card;
  }

  // Scroll infinito
  window.addEventListener('scroll', () => {
    if (_feedEsgotado || _feedLoading) return;
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
      carregarFeed();
    }
  });

  // ── Busca de usuários ──────────────────────────────────────────
  function abrirModalBuscarUsuarios() {
    if (!token) { window.location.href = 'index.html'; return; }
    document.getElementById('social-modal-overlay').classList.add('open');
    document.getElementById('social-busca-input').value = '';
    document.getElementById('social-busca-resultados').innerHTML = '';
    setTimeout(() => document.getElementById('social-busca-input').focus(), 50);
  }

  function fecharModalSocial() {
    document.getElementById('social-modal-overlay').classList.remove('open');
  }

  document.getElementById('social-modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) fecharModalSocial();
  });

  let _buscaTimer;
  document.getElementById('social-busca-input').addEventListener('input', function() {
    clearTimeout(_buscaTimer);
    const q   = this.value.trim();
    const res = document.getElementById('social-busca-resultados');
    if (q.length < 2) { res.innerHTML = ''; return; }

    res.innerHTML = '<div class="loading" style="padding:20px"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

    _buscaTimer = setTimeout(async () => {
      try {
        const usuarios = await apiReq('GET', `/social/usuarios/buscar?q=${encodeURIComponent(q)}`);
        if (!usuarios.length) {
          res.innerHTML = `<div class="social-busca-vazio">Nenhum usuário encontrado para "${q}".</div>`;
          return;
        }
        res.innerHTML = '';
        for (const u of usuarios) {
          const item = document.createElement('div');
          item.className = 'social-user-item';
          item.innerHTML = `
            <div class="social-user-avatar">${iniciais(u.nome)}</div>
            <div class="social-user-info">
              <strong>${u.nome}</strong>
              <small>${u.total_avaliacoes} avaliações · ${u.total_seguidores} seguidores</small>
            </div>`;
          const btn = document.createElement('button');
          btn.className = 'btn-follow' + (u.ja_sigo ? ' seguindo' : '');
          btn.dataset.seguindo = u.ja_sigo ? 'true' : 'false';
          btn.textContent = u.ja_sigo ? '✓ Seguindo' : '+ Seguir';
          btn.addEventListener('click', () => toggleFollow(u.id, btn));
          item.appendChild(btn);
          res.appendChild(item);
        }
      } catch {
        res.innerHTML = '<div class="social-busca-vazio">Erro na busca.</div>';
      }
    }, 350);
  });

  // ── Init ───────────────────────────────────────────────────────
  renderLoginBox();
  lucide.createIcons();
  carregarFeed(true);
</script>
</body>
</html>
